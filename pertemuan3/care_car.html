<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Rental Mobil | Portfolio Ayu Rahma Naifah</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        :root { 
            --primary-color: #6366f1; --primary-hover: #4f46e5; --secondary-color: #ec4899; 
            --bg-light: #f8fafc; --bg-card: #ffffff; --text-dark: #1e293b; --text-muted: #64748b; 
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); 
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
        }
        .pink-theme { 
            --primary-color: #ec4899; --primary-hover: #db2777; --secondary-color: #f472b6; 
            --bg-light: #fff1f2; --text-dark: #831843; 
        }
        
        body { font-family: 'Inter', sans-serif; background: var(--bg-light); color: var(--text-dark); overflow-x: hidden; }
        
        /* Sinkronisasi Style Navbar dari index.html */
        .navbar { background: rgba(255, 255, 255, 0.95) !important; backdrop-filter: blur(10px); box-shadow: var(--shadow-sm); position: sticky; top: 0; z-index: 1000; }
        .navbar-brand { font-weight: 700; color: var(--primary-color) !important; }
        .nav-link { font-weight: 500; color: var(--text-dark) !important; transition: var(--transition); }
        .nav-link:hover, .nav-link.active { color: var(--primary-color) !important; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-on-scroll { opacity: 0; }
        .animate-on-scroll.is-visible { animation: fadeInUp 0.8s forwards cubic-bezier(0.165, 0.84, 0.44, 1); }
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }

        .hero-rental { 
            background: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.6)), url('https://images.unsplash.com/photo-1610809376778-928ee2c3a561?auto=format&fit=crop&q=80');
            background-size: cover; background-position: center; padding: 7rem 0; color: white;
            position: relative;
        }
        
        .search-container { 
            background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(20px); 
            border-radius: 24px; padding: 2.5rem; border: 1px solid rgba(255,255,255,0.2); 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            transform: translateY(30px);
            z-index: 10;
        }
        
        .car-card { 
            border: 1px solid rgba(0,0,0,0.05); border-radius: 20px; transition: var(--transition); 
            background: var(--bg-card); overflow: hidden; height: 100%; display: flex; flex-direction: column;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }
        .car-card:hover { transform: translateY(-10px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        .car-img-wrapper { overflow: hidden; height: 220px; }
        .car-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s ease; }
        .car-card:hover .car-img { transform: scale(1.08); }
        
        .car-specs { display: flex; gap: 1rem; margin: 1.2rem 0; padding-bottom: 1.2rem; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .spec-item { display: flex; align-items: center; gap: 0.4rem; font-size: 0.85rem; color: var(--text-muted); }
        
        .btn-rental { 
            background: linear-gradient(135deg, var(--primary-color), var(--primary-hover)); 
            border: none; color: white; font-weight: 600; padding: 0.8rem 1.5rem; 
            border-radius: 12px; transition: var(--transition);
        }
        .btn-rental:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3); color: white; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light">
  <div class="container">
    <a class="navbar-brand" href="../index.html"><i class="bi bi-person-circle me-2"></i>Portfolio Ayu</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="../index.html"><i class="bi bi-house me-1"></i>Home</a></li>
        <li class="nav-item"><a class="nav-link" href="../tugas.html"><i class="bi bi-journal-text me-1"></i>Tugas</a></li>
        <li class="nav-item"><a class="nav-link" href="../list.html"><i class="bi bi-person me-1"></i>About</a></li>
        <li class="nav-item"><a class="nav-link" href="../form.html"><i class="bi bi-envelope me-1"></i>Contact</a></li>
        <li class="nav-item"><a class="nav-link active" href="care_car.html"><i class="bi bi-car-front-fill me-1"></i>Car rental</a></li>
      </ul>
      <button id="theme-toggle" class="btn btn-sm btn-outline-secondary mt-2 mt-lg-0 ms-lg-3 rounded-pill px-3">
          <i class="bi bi-brightness-high-fill me-1"></i> Light
      </button>
    </div>
  </div>
</nav>

<header class="hero-rental text-center">
    <div class="container">
        <h1 class="display-4 fw-bold mb-3 animate-on-scroll is-visible">Find Your Perfect Drive</h1>
        <p class="lead mb-5 text-white-50 animate-on-scroll is-visible delay-1">Pilih kendaraan premium, tentukan tanggal, dan mulai perjalanan Anda.</p>
        
        <div class="search-container mx-auto animate-on-scroll is-visible delay-2">
            <form class="row g-3 align-items-center" id="searchForm">
                <div class="col-md-4">
                    <div class="form-floating text-dark text-start">
                        <select class="form-select fw-medium" id="location">
                            <option value="all">Semua Lokasi</option>
                            <option value="1">Yogyakarta - YIA Airport</option>
                            <option value="2">Bali - Ngurah Rai</option>
                        </select>
                        <label for="location"><i class="bi bi-geo-alt-fill text-primary me-1"></i> Titik Ambil</label>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="form-floating text-dark text-start">
                        <input type="date" class="form-control fw-medium" id="start">
                        <label for="start"><i class="bi bi-calendar-check me-1"></i> Tanggal Mulai</label>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="form-floating text-dark text-start">
                        <input type="date" class="form-control fw-medium" id="end">
                        <label for="end"><i class="bi bi-calendar-x me-1"></i> Tanggal Kembali</label>
                    </div>
                </div>
                <div class="col-md-2 d-grid">
                    <button type="button" id="btnSearch" class="btn btn-rental h-100 fs-5"><i class="bi bi-search"></i> Cari</button>
                </div>
            </form>
        </div>
    </div>
</header>

<main class="container py-5 mt-4">
    <div class="text-center mb-5 animate-on-scroll is-visible">
        <span class="badge bg-primary-subtle text-primary px-3 py-2 rounded-pill mb-2 fw-semibold">Katalog Kendaraan</span>
        <h2 class="fw-bold display-6">Pilih Armada Anda</h2>
    </div>
    <div class="row g-4" id="car-container"></div>
</main>

<footer class="bg-dark text-white py-4 mt-5 text-center">
    <div class="container">
        <p class="mb-0">&copy; <span id="year"></span> Ayu Rahma Naifah | NIM: 241110099 | Universitas Mercu Buana Yogyakarta</p>
    </div>
</footer>

<script>
    document.getElementById('year').textContent = new Date().getFullYear();

    const carData = [
        {
            id: 1, name: "BMW M4", rating: "5.0", locationId: "1", locationName: "Yogyakarta",
            desc: "Coupe sport dengan aerodinamika presisi dan handling agresif.", seats: 4, transmission: "Otomatis", fuel: "Bensin", price: 3500000,
            image: "https://i.pinimg.com/1200x/b6/ac/26/b6ac26e6ddbcf4adc924c95083089f45.jpg"
        },
        {
            id: 2, name: "BMW M5", rating: "4.9", locationId: "2", locationName: "Bali",
            desc: "Super-sedan yang menggabungkan kemewahan eksekutif dan performa sirkuit.", seats: 5, transmission: "Otomatis", fuel: "Bensin", price: 4200000,
            image: "https://i.pinimg.com/736x/85/67/5f/85675f7c528f1d08b0564bce890d0709.jpg"
        },
        {
            id: 3, name: "BMW M3 GTR ", rating: "4.8", locationId: "1", locationName: "Yogyakarta",
            desc: "Legenda JDM klasik dengan sistem penggerak AWD ikonik.", seats: 4, transmission: "Manual", fuel: "Bensin", price: 5000000,
            image: "https://i.pinimg.com/1200x/af/37/29/af3729e19efaddd76e36c7ff30fcbf31.jpg"
        }
    ];

    const carContainer = document.getElementById('car-container');

    function renderCars(cars) {
        carContainer.innerHTML = '';
        if(cars.length === 0) {
            carContainer.innerHTML = '<div class="col-12 text-center text-muted py-5"><h4>Tidak ada kendaraan tersedia.</h4></div>';
            return;
        }

        cars.forEach((car, index) => {
            const formatPrice = new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(car.price);
            
            const cardHTML = `
            <div class="col-lg-4 col-md-6 animate-on-scroll is-visible" style="animation-delay: ${index * 0.1}s">
                <div class="car-card">
                    <div class="car-img-wrapper">
                        <img src="${car.image}" class="car-img" alt="${car.name}">
                    </div>
                    <div class="card-body p-4 d-flex flex-column">
                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <h4 class="fw-bold mb-0">${car.name}</h4>
                            <span class="badge bg-dark rounded-pill"><i class="bi bi-star-fill text-warning me-1"></i> ${car.rating}</span>
                        </div>
                        <div class="mb-2"><span class="badge bg-primary-subtle text-primary"><i class="bi bi-geo-alt-fill me-1"></i>${car.locationName}</span></div>
                        <p class="text-muted small flex-grow-1">${car.desc}</p>
                        <div class="car-specs">
                            <div class="spec-item"><i class="bi bi-people-fill text-primary"></i> ${car.seats}</div>
                            <div class="spec-item"><i class="bi bi-gear-fill text-primary"></i> ${car.transmission}</div>
                        </div>
                        <div class="d-flex justify-content-between align-items-center mt-3">
                            <div>
                                <span class="fs-5 fw-bold text-dark">${formatPrice}</span><span class="text-muted small"> /hari</span>
                            </div>
                            <button class="btn btn-rental py-2 px-3" onclick="openBooking(${car.id})">Sewa</button>
                        </div>
                    </div>
                </div>
            </div>`;
            carContainer.insertAdjacentHTML('beforeend', cardHTML);
        });
    }

    document.getElementById('btnSearch').addEventListener('click', () => {
        const locId = document.getElementById('location').value;
        const filteredCars = locId === 'all' ? carData : carData.filter(car => car.locationId === locId);
        renderCars(filteredCars);
    });

    function openBooking(carId) {
        const startDate = document.getElementById('start').value;
        const endDate = document.getElementById('end').value;

        if (!startDate || !endDate) {
            alert("Harap pilih tanggal sewa terlebih dahulu!");
            window.scrollTo({ top: 0, behavior: 'smooth' });
            return;
        }

        const duration = (new Date(endDate) - new Date(startDate)) / (1000 * 60 * 60 * 24);
        if (duration <= 0) {
            alert("Tanggal kembali tidak valid!");
            return;
        }

        window.location.href = `rental_form.html?carId=${carId}&start=${startDate}&end=${endDate}`;
    }

    // Logic Sinkronisasi Tema
    const themeToggle = document.getElementById('theme-toggle');
    const body = document.body;
    
    function updateToggleUI(isPink) { 
        if (isPink) { 
            themeToggle.innerHTML = '<i class="bi bi-heart-fill me-1"></i> Pink'; 
            themeToggle.className = 'btn btn-sm btn-outline-danger mt-2 mt-lg-0 ms-lg-3 rounded-pill px-3'; 
        } else { 
            themeToggle.innerHTML = '<i class="bi bi-brightness-high-fill me-1"></i> Light'; 
            themeToggle.className = 'btn btn-sm btn-outline-secondary mt-2 mt-lg-0 ms-lg-3 rounded-pill px-3'; 
        } 
    }
    
    themeToggle.addEventListener('click', () => {
        body.classList.toggle('pink-theme');
        const isPink = body.classList.contains('pink-theme');
        localStorage.setItem('theme', isPink ? 'pink' : 'light');
        updateToggleUI(isPink);
    });
    
    if (localStorage.getItem('theme') === 'pink') {
        body.classList.add('pink-theme');
        updateToggleUI(true);
    }

    renderCars(carData);
</script>
</body>
</html>
