<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Rental</title>
    <link rel="stylesheet" href="style_caremobil.css">
</head>

<body>
    <div id="search">
        <div class="title">
            <h1>Car Rental</h1>
            <p>Find the perfect car for your next adventure</p>
            <hr>
        </div>
        <div class="form-container">
            <div class="form-group">
                <label for="pickup">Rental Location:</label>
                <select id="pickup" name="pickup">
                    <option value="">Select Location</option>
                    <option value="location1">Yogyakarta</option>
                    <option value="location2">Bali</option>
                </select>
            </div>
            <div class="form-group">
                <label for="pickup-date">Rental Start Date:</label>
                <input type="date" id="pickup-date" name="pickup-date">
            </div>
            <div class="form-group">
                <label for="return-date">Rental End Date:</label>
                <input type="date" id="return-date" name="return-date">
            </div>
            <button type="submit">Search</button>
        </div>
    </div>

    <div class="car-list">
        <h2>Car List</h2>
        <div class="car-item">
            <img src="https://i.pinimg.com/1200x/b6/ac/26/b6ac26e6ddbcf4adc924c95083089f45.jpg" alt="Car 1">
            <h3>BMW M4</h3>
            <p>Mobil sport premium dengan desain agresif dan performa tinggi </p>
        </div>
        <div class="car-item">
            <img src="https://i.pinimg.com/736x/85/67/5f/85675f7c528f1d08b0564bce890d0709.jpg" alt="Car 2">
            <h3>BMW M5</h3>
            <p>Mobil supercar mewah dengan desain futuristik dan performa ekstrem</p>
        </div>
        <div class="car-item">
            <img src="https://i.pinimg.com/1200x/af/37/29/af3729e19efaddd76e36c7ff30fcbf31.jpg" alt="Car 2">
            <h3>GTR R34</h3>
            <p>Car Detail</p>
        </div>
        <div class="car-item">
            <img src="url" alt="Car 2">
            <h3>Car 2</h3>
            <p>Car Detail</p>
        </div>
    </div>
</body>

</html>
